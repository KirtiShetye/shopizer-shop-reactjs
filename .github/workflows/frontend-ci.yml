name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build React app
      run: npm run build
      
    - name: Create artifact archive
      run: |
        cd build
        tar -czf ../shopizer-frontend.tar.gz .
        cd ..
        
    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: shopizer-frontend-${{ github.sha }}
        path: shopizer-frontend.tar.gz
        retention-days: 30
        
    - name: Build Summary
      if: always()
      run: |
        echo "✅ Build completed"
        echo "📦 Artifact: shopizer-frontend.tar.gz"
        ls -lh shopizer-frontend.tar.gz
